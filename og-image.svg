<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#100c18"/>
      <stop offset="1" stop-color="#080709"/>
    </linearGradient>
    <radialGradient id="b1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9D5CFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#9D5CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6e3cdc" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6e3cdc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="360" fill="url(#b1)"/>
  <circle cx="180" cy="560" r="320" fill="url(#b2)"/>

  <!-- brand row -->
  <g transform="translate(80,86)">
    <circle cx="8" cy="6" r="8" fill="#9D5CFF"/>
    <text x="30" y="12" fill="#EDEDED" font-size="24" font-weight="700" letter-spacing="0.5">Web<tspan fill="#9D5CFF">{X}</tspan> Studio</text>
    <text x="232" y="12" fill="#8A8A92" font-size="18" letter-spacing="3">— BENGALURU, INDIA</text>
  </g>

  <!-- headline -->
  <text x="80" y="280" fill="#EDEDED" font-size="78" font-weight="700" letter-spacing="-2">Web design, landing pages</text>
  <text x="80" y="368" fill="#EDEDED" font-size="78" font-weight="700" letter-spacing="-2">&amp; <tspan fill="#9D5CFF">SEO that ranks.</tspan></text>

  <!-- sub -->
  <text x="80" y="438" fill="#B8B8C0" font-size="29" font-weight="400">Design · Development · SEO · Motion — India → Worldwide</text>

  <!-- chips -->
  <g transform="translate(80,500)" font-size="22" font-weight="500">
    <g><rect x="0" y="0" width="232" height="56" rx="28" fill="none" stroke="rgba(255,255,255,0.18)"/><text x="116" y="36" fill="#EDEDED" text-anchor="middle">Landing Pages</text></g>
    <g transform="translate(252,0)"><rect x="0" y="0" width="252" height="56" rx="28" fill="none" stroke="rgba(255,255,255,0.18)"/><text x="126" y="36" fill="#EDEDED" text-anchor="middle">Website Design</text></g>
    <g transform="translate(524,0)"><rect x="0" y="0" width="190" height="56" rx="28" fill="none" stroke="rgba(255,255,255,0.18)"/><text x="95" y="36" fill="#EDEDED" text-anchor="middle">SEO Ranking</text></g>
    <g transform="translate(734,0)"><rect x="0" y="0" width="180" height="56" rx="28" fill="none" stroke="rgba(255,255,255,0.18)"/><text x="90" y="36" fill="#EDEDED" text-anchor="middle">Web Apps</text></g>
  </g>

  <!-- big watermark mark -->
  <g transform="translate(905,330) scale(3.0)" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <path d="M37 30 c-7 0 -10 3 -10 9 v5 c0 5 -3 7 -6 7 c3 0 6 2 6 7 v5 c0 6 3 9 10 9" stroke="#EDEDED" stroke-width="6"/>
    <path d="M63 30 c7 0 10 3 10 9 v5 c0 5 3 7 6 7 c-3 0 -6 2 -6 7 v5 c0 6 -3 9 -10 9" stroke="#EDEDED" stroke-width="6"/>
    <path d="M42 39 L58 61 M58 39 L42 61" stroke="#9D5CFF" stroke-width="9"/>
  </g>
</svg>
